model:
  default: google/gemini-2.0-flash-001
  provider: openrouter
  api_mode: chat_completions
  max_tokens: 4096
  api_max_retries: 3
terminal:
  backend: local
  cwd: /data
  timeout: 120
  lifetime_seconds: 300
compression:
  enabled: true
  threshold: 0.7
  target_ratio: 0.3
  protect_last_n: 10
  summary_model: deepseek/deepseek-chat-v3-0324
  summary_provider: openrouter
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 50
  flush_min_turns: 30
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
streaming:
  enabled: true
agent:
  max_turns: 20
delegation:
  model: anthropic/claude-sonnet-4-6
  provider: openrouter
  max_iterations: 10
  verbose: false
skills:
  creation_nudge_interval: 15
platform_toolsets:
  telegram:
  - hermes-telegram
display:
  compact: false
  tool_progress: none
  interim_assistant_messages: false
  show_reasoning: false
  streaming: true
